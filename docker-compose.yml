services:
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
    env_file: .env
    environment:
      RUN_MIGRATIONS: "true"
      RUN_SEEDERS: "true"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
    env_file: .env
    command: php artisan horizon
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
    env_file: .env
    command: php artisan schedule:work
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
    env_file: .env
    ports:
      - "3000:3000"
    command: npm run dev -- --hostname 0.0.0.0
    depends_on:
      api:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-oopseller}
      MYSQL_USER: ${DB_USERNAME:-oopseller}
      MYSQL_PASSWORD: ${DB_PASSWORD:-oopseller}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p${MYSQL_ROOT_PASSWORD:-root} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  redis:
    image: redis:8-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-miniosecret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  api_vendor:
  mysql_data:
  redis_data:
  minio_data:
  web_node_modules:
